<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title data-i18n="page.title">ProGen UI Audit — Example Project Report</title>
  <script>
    (function () {
      var k = "ui-audit-theme";
      var v = localStorage.getItem(k);
      if (v === "light" || v === "dark") document.documentElement.setAttribute("data-theme", v);
    })();
  </script>
</head>
<body>
  <article
    class="card"
    id="dashboard"
    data-html2pdf-src="../progen-craft/design-system/utils/html2pdf.bundle.min.js"
  >
    <button
      type="button"
      class="theme-toggle"
      id="theme-toggle"
      data-i18n-title="theme.toggleTitle"
      title="Switch theme. Alt+click: use system setting"
    >
      <span class="theme-toggle__icon theme-toggle__icon--moon" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
        </svg>
      </span>
      <span class="theme-toggle__icon theme-toggle__icon--sun" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="4" />
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" />
        </svg>
      </span>
    </button>

    <div class="dashboard-views">
      <div id="view-overview" class="view-pane">
        <div class="audit-banner" id="audit-banner" aria-label="Audit context">
          <div class="audit-banner__main">
            <div class="audit-banner__brand">
              <span class="audit-banner__logo" aria-hidden="true">
                <!-- Source: ProGenTeam docs/AI-logo.svg — fills use currentColor; theme via --audit-logo-color -->
                <svg
                  class="audit-banner__logo-svg"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="-2693.5044 -1485.6029 2760.9639 2720.9631"
                  focusable="false"
                >
                  <path
                    fill="currentColor"
                    d="M -1830.2 -1201.7 C -2114.6 -1044.8 -2347.8 -915.62 -2349 -914.4 C -2351.8 -911.5 -2694.9 189.131 -2693.5 191.311 C -2692.4 193.241 -1315.5 1234.63 -1312.8 1235.36 C -1311.1 1235.84 60.836 199.291 67.346 192.761 C 69.666 190.341 37.136 84.171 -101.8 -361.55 C -200.54 -677.64 -275.35 -913.92 -277.44 -915.62 C -281.63 -918.76 -1304.6 -1483.7 -1310 -1485.6 C -1312.1 -1486.3 -1536.7 -1363.8 -1830.2 -1201.7 Z M -850.63 -1066.5 L -391.06 -812.6 L -243.29 -339.06 C -161.97 -78.589 -95.524 134.711 -95.764 134.961 C -98.314 138.341 -1311.6 1054.45 -1312.8 1053.97 C -1314.1 1053.48 -2515.1 145.841 -2526.3 136.891 C -2528.8 134.961 -2497.9 33.861 -2381.5 -339.06 L -2233.5 -812.6 L -1774.6 -1066.3 C -1522.3 -1205.6 -1314.6 -1320 -1313 -1320 C -1311.6 -1320.2 -1103.4 -1206.1 -850.63 -1066.5 Z"
                  />
                  <path
                    fill="currentColor"
                    d="M -1533.534 711.885 L -1688.428 594.182 L -1691 219.606 L -1681.849 -170.725 C -1681.849 -170.725 -1669.4 -363.13 -1718.7 -383.69 C -1764 -402.56 -1864.8 -351.72 -1897.4 -318.1 C -1924.1 -290.29 -1925.4 -182.08 -1925.4 -182.08 L -1967.9 239.674 C -1978.261 350.639 -1984.4 410.217 -1984.8 410.217 C -1986.9 410.217 -2327.8 176.191 -2330.1 173.771 C -2332.2 171.601 -2243.7 -152.39 -2166 -524.15 L -1867.5 -759.94 L -1855.7 -766.67 C -1585.4 -973.57 -1372 -1119.7 -1371.3 -1119.3 C -1370.8 -1118.5 -1370.6 -681.5 -1370.8 -148 L -1371.5 822.045 L -1533.534 711.885 Z"
                  />
                  <path
                    fill="currentColor"
                    d="M -1242.6 -807.51 L -1242.6 -495.54 L -1126.4 -495.54 L -1010.2 -495.54 L -1010.2 -213.78 L -1010.2 67.961 L -1126.4 67.961 L -1242.6 67.961 L -1242.6 445.481 C -1242.6 684.915 -1241.7 822.525 -1240.3 822.045 C -1239.1 821.555 -1017.4 654.445 -747.7 450.321 C -397.56 185.501 -257.46 78.361 -258.39 75.951 C -259.09 74.011 -259.79 71.351 -259.79 70.141 C -259.79 68.931 -345.75 67.961 -474.7 67.961 L -689.61 67.961 L -689.61 -213.78 L -689.61 -495.54 L -564.15 -495.54 C -475.4 -495.54 -438.69 -496.25 -438.69 -498.19 C -438.69 -503.75 -504.21 -709.8 -506.76 -712.47 C -508.85 -714.64 -1186.6 -1089.7 -1231.4 -1113.7 L -1242.6 -1119.5 L -1242.6 -807.51 Z"
                  />
                  <path
                    fill="currentColor"
                    d="M -1679.9 -97.817 L -1939.1 -47.43 C -1939.1 -47.43 -1957.531 69.128 -1949.714 69.128 L -1680.976 93.791 L -1679.9 -97.817 Z"
                  />
                </svg>
              </span>
              <div class="audit-banner__brand-text">
                <div class="audit-banner__headline">
                  <h1 class="audit-banner__title" id="dash-audit-title">ProGen UI Audit</h1>
                  <div class="audit-banner__status-tags" aria-label="Audit status">
                    <div class="audit-banner__golive" id="dash-golive-wrap" hidden>
                      <span class="audit-rag" id="dash-golive-badge" role="status"></span>
                    </div>
                    <div class="audit-banner__rag" id="dash-rag-wrap" hidden>
                      <span class="audit-rag" id="dash-rag-badge" role="status"></span>
                    </div>
                  </div>
                </div>
                <div class="audit-banner__meta-grid" id="dash-audit-meta" hidden>
                  <div class="audit-banner__meta-col" id="dash-audit-meta-left"></div>
                  <div class="audit-banner__meta-col" id="dash-audit-meta-right"></div>
                </div>
              </div>
            </div>
            <div class="audit-banner__pdf-row">
              <div id="dash-pdf-download-root" class="audit-banner__pdf-root"></div>
            </div>
          </div>
        </div>

        <header class="header">
          <h2 class="section-heading" id="dash-section-title" data-i18n="defaults.sectionTitle">Overall Compliance</h2>
          <p class="subtitle" id="dash-checklist-summary" data-i18n="defaults.checklistSummary">1,240 Total Checklist</p>
        </header>

        <section class="summary">
          <div class="summary-left">
            <div class="big" id="dash-total-compliance">81</div>
            <div class="label" data-i18n="defaults.totalComplianceLabel">Total compliance</div>
          </div>
          <div class="donut-wrap" role="img" data-i18n-aria="donut.ariaLabel" aria-label="Compliance breakdown by domain">
            <svg class="donut-svg" id="donut-svg" viewBox="0 0 100 100" aria-hidden="true"></svg>
            <div class="donut-tooltip" id="donut-tooltip" role="tooltip"></div>
            <div class="donut-center">
              <span class="pct" id="dash-overview-pct">81%</span>
              <span class="center-label" id="dash-center-label" data-i18n="donut.overall">Overall</span>
            </div>
          </div>
        </section>

        <section
          class="metric-categories"
          id="metric-categories-root"
          data-i18n-aria="metrics.categoriesAria"
          aria-label="Metrics by category"
        ></section>

        <div class="rows rows--interactive" id="dash-domains" role="list" hidden></div>
      </div>

      <div id="view-drilldown" class="view-pane is-hidden" aria-hidden="true">
        <p class="drilldown-project-name" id="dash-drill-project-name">ProGen UI Audit</p>
        <button type="button" class="back-nav" id="drill-back" data-i18n-aria="nav.backAria" aria-label="Back to overview">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 18l-6-6 6-6" /></svg>
          <span data-i18n="nav.back">Back</span>
        </button>
        <h3 class="drilldown-title" id="drill-title"></h3>
        <div class="metrics-table-scroll">
          <table class="metrics-table" id="drill-metrics-table">
            <thead>
              <tr>
                <th scope="col" class="metrics-th metrics-th--metric" data-i18n="table.metric">Metric</th>
                <th scope="col" class="metrics-th metrics-th--compliance" data-i18n="table.compliance">Compliance</th>
                <th scope="col" class="metrics-th metrics-th--score" data-i18n="table.score">Score</th>
              </tr>
            </thead>
            <tbody id="drill-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <p class="dashboard-ai-note" data-i18n="footer.aiDisclaimer" role="note">
      NOTE: This is an AI-driven experience, and while we strive for accuracy, AI may sometimes generate
      unexpected or imperfect responses.
    </p>
  </article>

  <script type="module" src="./src/audit-dashboard-mcp-entry.js"></script>
</body>
</html>
